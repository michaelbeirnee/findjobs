name: Daily Intern Posting Check
 
on:
  schedule:
    # Runs every day at 7:00 AM UTC
    - cron: "0 7 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI
 
jobs:
  check-intern-postings:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: pip install requests beautifulsoup4
 
      - name: Run intern posting scraper
        run: python scraper.py
 
      - name: Commit updated intern_status.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add intern_status.json
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: update intern job postings [skip ci]"
 
      - name: Push changes
        run: git push