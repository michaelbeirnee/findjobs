name: Daily Intern Posting Check
 
on:
  schedule:
    # Runs every day at 7:00 AM UTC
    - cron: "0 7 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

concurrency:
  group: intern-check
  cancel-in-progress: false

jobs:
  check-intern-postings:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Run IB intern posting scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_AI_SCAN: "1"
        run: python scraper.py firms_data.json intern_status.json
 
      - name: Run PE intern posting scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_AI_SCAN: "1"
        run: python scraper.py pe_firms_data.json pe_intern_status.json
 
      - name: Run VC intern posting scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_AI_SCAN: "1"
        run: python scraper.py vc_firms_data.json vc_intern_status.json
 
      - name: Run Hedge Fund intern posting scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_AI_SCAN: "1"
        run: python scraper.py hedge_funds_data.json hedge_intern_status.json

      - name: Run SWE intern posting scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_AI_SCAN: "1"
        run: python scraper.py swe_firms_data.json swe_intern_status.json
 
      - name: Commit updated status files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add intern_status.json pe_intern_status.json vc_intern_status.json hedge_intern_status.json swe_intern_status.json
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: update intern job postings [skip ci]"
 
      - name: Push changes
        run: git pull --rebase && git push
