<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindJobs — Hedge Funds</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="nav">
    <div class="nav__inner">
      <a class="nav__logo" href="index.html"><span>FindJobs</span></a>
      <div class="nav__search">
        <svg class="nav__search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Search hedge funds…" autocomplete="off" />
        <button id="clearSearch" class="nav__search-clear" aria-label="Clear search" hidden>✕</button>
      </div>
      <a class="nav__link" href="index.html">IB Firms</a>
      <a class="nav__link" href="pe.html">PE Firms</a>
      <a class="nav__link" href="vc.html">VC Firms</a>
      <a class="nav__link" href="recent.html">Recent Postings</a>
      <div class="nav__badge"><span class="verified-badge">Top Hedge Funds</span></div>
    </div>
  </header>

  <div class="hero">
    <div class="hero__inner">
      <h1 class="hero__title">Hedge Fund Job Board</h1>
      <p class="hero__sub">Browse <strong id="totalCount">—</strong> hedge funds by AUM and jump straight to job searches.</p>
    </div>
  </div>

  <main class="layout">
    <aside class="sidebar">
      <div class="sidebar__section">
        <h3 class="sidebar__label">Rank Band</h3>
        <label class="filter-check"><input type="checkbox" name="band" value="Top 50" checked /> Top 50</label>
        <label class="filter-check"><input type="checkbox" name="band" value="51-100" checked /> 51-100</label>
      </div>
      <div class="sidebar__section">
        <h3 class="sidebar__label">Sort by</h3>
        <select id="sortSelect" class="sidebar__select">
          <option value="rank">Rank (AUM)</option>
          <option value="alpha">Alphabetical</option>
        </select>
      </div>
      <p class="sidebar__credit">Source: <em>Largest Hedge Funds by AUM</em></p>
    </aside>

    <section class="cards-section">
      <div class="results-bar"><span id="resultsCount"></span></div>
      <div class="cards" id="cardsGrid"></div>
      <div class="empty-state" id="emptyState" hidden><p>No firms match your filters.</p></div>
    </section>
  </main>

  <footer class="footer"><p>FindJobs — Hedge Fund Recruiting</p></footer>
  <script src="hedge_script.js"></script>
</body>
</html>
